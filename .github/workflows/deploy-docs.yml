name: Deploy Docs

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Node.js
        run: |
          node --version
          npm --version
          which npm || echo "npm not found in PATH"
          which npx || echo "npx not found in PATH"
          echo "PATH: $PATH"

      - name: Install npm dependencies
        working-directory: ./sonner-interop
        run: npm ci

      - name: Build Sonner bundle
        working-directory: ./sonner-interop
        run: |
          chmod +x node_modules/.bin/vite
          npm run build

      - name: Verify Sonner bundle
        run: |
          if [ -f ./sonner-interop/dist/sonner-interop.iife.js ]; then
            echo "✓ Sonner bundle built successfully"
            ls -lh ./sonner-interop/dist/sonner-interop.iife.js
          else
            echo "✗ Sonner bundle NOT found!"
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore ShadcnBlazor.sln

      - name: Publish Docs
        run: dotnet publish src/ShadcnBlazor.Docs/ShadcnBlazor.Docs.csproj -c Release -o output

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy output/wwwroot --project-name=shadcnblazor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
